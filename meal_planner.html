<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Planner & Grocery List</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
  .header{background:#fff;border-bottom:1px solid #e8e8e3;padding:16px 24px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .header h1{font-size:18px;font-weight:600;letter-spacing:-.3px}
  .tabs{display:flex;gap:4px}
  .tab{padding:8px 18px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;border-radius:20px;color:#666;transition:all .15s}
  .tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .badge{display:inline-flex;align-items:center;justify-content:center;background:#e74c3c;color:#fff;border-radius:10px;min-width:18px;height:18px;font-size:11px;padding:0 5px;margin-left:5px}
  .main{max-width:1100px;margin:0 auto;padding:24px 20px}
  .section-head{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid #e8e8e3}
  .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:8px}
  .recipe-card{background:#fff;border:1.5px solid #e8e8e3;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .recipe-card:hover{border-color:#bbb;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .recipe-card.selected{border-color:#1a1a1a;background:#fafafa}
  .card-header{padding:12px 12px 8px;display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
  .card-name{font-size:13px;font-weight:600;line-height:1.35;color:#1a1a1a}
  .checkmark{width:20px;height:20px;border:1.5px solid #ccc;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:transparent;transition:all .15s}
  .recipe-card.selected .checkmark{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
  .card-macros{padding:0 12px 8px;display:flex;gap:5px;flex-wrap:wrap}
  .macro{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:500}
  .m-cal{background:#EEF4FF;color:#2563EB}
  .m-pro{background:#ECFDF5;color:#059669}
  .m-fib{background:#FFFBEB;color:#D97706}
  .card-serving{padding:0 12px 8px;font-size:11px;color:#999}
  .serving-ctrl{padding:0 12px 8px;display:flex;align-items:center;gap:6px}
  .sv-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid #ccc;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#444;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;transition:border-color .1s}
  .sv-btn:hover{border-color:#1a1a1a;color:#1a1a1a}
  .sv-label{font-size:13px;font-weight:700;color:#1a1a1a;min-width:26px;text-align:center}
  .sv-note{font-size:11px;color:#999}
  .card-expand{padding:0 12px 8px;display:flex;align-items:center;gap:4px;font-size:11px;color:#2563EB;font-weight:500}
  .card-expand svg{transition:transform .2s}
  .card-expand.open svg{transform:rotate(180deg)}
  .recipe-detail{display:none;border-top:1px solid #f0f0ea;padding:12px;background:#fafaf8}
  .recipe-detail.open{display:block}
  .detail-section{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px}
  .detail-section:first-child{margin-top:0}
  .ingredient-list{list-style:none;font-size:12px;line-height:2}
  .ingredient-list li::before{content:"·";margin-right:6px;color:#ccc}
  .step-list{list-style:none;counter-reset:steps;font-size:12px;line-height:1.6}
  .step-list li{counter-increment:steps;display:flex;gap:8px;margin-bottom:6px}
  .step-list li::before{content:counter(steps);min-width:18px;height:18px;background:#e8e8e3;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}
  .recipe-link{display:inline-block;margin-top:8px;font-size:12px;color:#2563EB;text-decoration:none;font-weight:500}
  .recipe-link:hover{text-decoration:underline}
  /* Grocery */
  .grocery-wrap{display:grid;grid-template-columns:1fr 320px;gap:20px}
  @media(max-width:700px){.grocery-wrap{grid-template-columns:1fr}}
  .grocery-main{}
  .grocery-sidebar{background:#fff;border:1px solid #e8e8e3;border-radius:12px;padding:16px;height:fit-content;position:sticky;top:80px}
  .sidebar-title{font-size:13px;font-weight:600;margin-bottom:12px}
  .summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0ea;font-size:13px}
  .summary-row:last-child{border-bottom:none}
  .summary-val{font-weight:600}
  .summary-val.cal{color:#2563EB}
  .summary-val.pro{color:#059669}
  .summary-val.fib{color:#D97706}
  .sidebar-actions{margin-top:14px;display:flex;flex-direction:column;gap:6px}
  .btn{padding:8px 14px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-weight:500;color:#444;width:100%;text-align:left;transition:background .1s}
  .btn:hover{background:#f5f5f0}
  .grocery-section{margin-bottom:16px}
  .grocery-section-head{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:6px}
  .grocery-items{display:flex;flex-direction:column;gap:4px}
  .grocery-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border:1px solid #e8e8e3;border-radius:8px;font-size:13px}
  .grocery-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#1a1a1a;flex-shrink:0}
  .grocery-item label{flex:1;cursor:pointer;line-height:1.3}
  .grocery-item.done label{text-decoration:line-through;color:#bbb}
  .from-tag{font-size:10px;color:#bbb;margin-left:auto;text-align:right;max-width:120px;line-height:1.2;flex-shrink:0}
  .empty-state{text-align:center;padding:60px 20px;color:#aaa}
  .empty-icon{font-size:40px;margin-bottom:12px}
  .empty-text{font-size:15px}
  .empty-sub{font-size:13px;margin-top:6px}
  #tab-grocery{display:none}
</style>
</head>

const CATS = {
  "Produce":["sweet potato","zucchini","onion","bell pepper","pepper","carrot","celery","broccoli","tomato","cucumber","avocado","lettuce","spinach","cabbage","edamame","snap pea","green bean","potato","corn","lemon","lime","ginger","garlic","parsley","cilantro","green onion","scallion","arugula","basil","dill","mint","shallot","eggplant","mushroom","water chestnut","quinoa sprout","squash"],
  "Protein":["chicken","beef","turkey","salmon","tuna","pork","shrimp","bacon","sausage","ground","steak","tenderloin","lamb","ham","lentil"],
  "Dairy & Eggs":["egg","milk","cheese","yogurt","butter","cream","sour cream","parmesan","cheddar","feta","mozzarella","cottage"],
  "Grains & Pasta":["oat","flour","pasta","orzo","rice","quinoa","noodle","tortilla","breadcrumb","bread","panko","muffin","tater tot","hash brown"],
  "Canned & Jarred":["can","bean","chickpea","tomato sauce","crushed tomato","diced tomato","tomato paste","coconut milk","salsa","broth","stock","cream of mushroom"],
  "Sauces & Condiments":["soy sauce","oyster sauce","sesame oil","balsamic","rice vinegar","honey","mustard","mayo","ketchup","bbq","ranch","sriracha","hot sauce","worcestershire","fish sauce","hoisin","tahini","peanut butter"],
  "Spices & Baking":["salt","pepper","garlic powder","onion powder","paprika","cumin","oregano","Italian seasoning","chili powder","curry","turmeric","garam masala","cinnamon","baking powder","brown sugar","vanilla","protein powder","taco seasoning","cornstarch"],
  "Oils & Other":["olive oil","vegetable oil","cooking spray"],
};

// selected: Map of recipeId -> servingMultiplier (default 1)
let selected = new Map();
let checked = new Set();

// ── Unit math engine ──────────────────────────────────────────
const FRACS = {'½':0.5,'¼':0.25,'¾':0.75,'⅓':1/3,'⅔':2/3,'⅛':0.125,'⅜':0.375,'⅝':0.625,'⅞':0.875};

function parseFrac(s) {
  s = s.trim();
  // pure unicode fraction
  if(FRACS[s]) return FRACS[s];
  // mixed like "1½" or "1 ½"
  let val = 0;
  for(const [f,v] of Object.entries(FRACS)) {
    if(s.includes(f)) { s = s.replace(f,'').trim(); val += v; break; }
  }
  // slash fraction like "2/3"
  const slash = s.match(/^(\d+)\/(\d+)$/);
  if(slash) return parseInt(slash[1])/parseInt(slash[2]);
  const num = parseFloat(s);
  return isNaN(num) ? 0 : num + val;
}

// Unit canonical names and conversion factors TO a base unit
// Volume base: tsp. Weight base: oz.
const VOL_TO_TSP = {tsp:1,teaspoon:1,teaspoons:1,tbsp:3,tablespoon:3,tablespoons:3,'fl oz':6,'fluid oz':6,cup:48,cups:48,pint:96,quart:192};
const WT_TO_OZ   = {oz:1,ounce:1,ounces:1,lb:16,lbs:16,pound:16,pounds:16,g:0.03527,gram:0.03527,grams:0.03527,kg:35.274};

const UNIT_RE = new RegExp(
  '^((?:[\\d½¼¾⅓⅔⅛⅜⅝⅞]+(?:[\\s\\-][\\d½¼¾⅓⅔⅛⅜⅝⅞/]+)?\\s*)+)' +
  '(tsp|teaspoons?|tbsp|tablespoons?|fl\\.?\\s*oz|fluid\\s*oz|cups?|pints?|quarts?|oz|ounces?|lbs?|pounds?|g|grams?|kg)' +
  '\\b(.*)$','i'
);
const COUNT_RE = /^((?:[\d½¼¾⅓⅔⅛⅜⅝⅞]+(?:[\s\-][\d½¼¾⅓⅔⅛⅜⅝⅞/]+)?\s*)+)(.*)/;

function parseIngredient(str) {
  str = str.trim();
  const vm = str.match(UNIT_RE);
  if(vm) {
    const qty = parseFrac(vm[1].trim());
    const unit = vm[2].toLowerCase().replace(/\s+/g,'');
    const name = vm[3].replace(/^[\s,]+/,'').trim();
    const volKey = Object.keys(VOL_TO_TSP).find(k=>unit.startsWith(k));
    const wtKey  = Object.keys(WT_TO_OZ).find(k=>unit===k);
    if(volKey) return {qty, unit:'vol', base: qty*VOL_TO_TSP[volKey], rawUnit:vm[2], name};
    if(wtKey)  return {qty, unit:'wt',  base: qty*WT_TO_OZ[wtKey],   rawUnit:vm[2], name};
    return {qty, unit:'other', base:qty, rawUnit:vm[2], name};
  }
  // count (no unit word)
  const cm = str.match(COUNT_RE);
  if(cm) {
    const qty = parseFrac(cm[1].trim());
    const name = cm[2].replace(/^[\s,]+/,'').trim();
    return {qty, unit:'count', base:qty, rawUnit:'', name};
  }
  return {qty:1, unit:'count', base:1, rawUnit:'', name:str};
}

function formatQty(val) {
  if(val===0) return '0';
  // try to express as clean fraction
  const fracs=[[1,1],[3,4],[2,3],[1,2],[1,3],[1,4],[1,8]];
  for(const [n,d] of fracs) {
    const whole = Math.floor(val);
    const rem = val - whole;
    const target = n/d;
    if(Math.abs(rem-target)<0.04) {
      const fStr = {0.5:'½',0.25:'¼',0.75:'¾',[1/3]:'⅓',[2/3]:'⅔',0.125:'⅛'}[target] || `${n}/${d}`;
      return whole>0 ? `${whole}${fStr}` : fStr;
    }
  }
  // round to 2 sig figs
  if(val>=10) return String(Math.round(val));
  if(val>=1) return String(parseFloat(val.toFixed(1)));
  return String(parseFloat(val.toFixed(2)));
}

function tspToHuman(tsp) {
  if(tsp>=48)  return {val:tsp/48,  unit:'cup'};
  if(tsp>=3)   return {val:tsp/3,   unit:'tbsp'};
  return       {val:tsp,            unit:'tsp'};
}
function ozToHuman(oz) {
  if(oz>=16)   return {val:oz/16, unit:'lb'};
  return       {val:oz,          unit:'oz'};
}

function formatIngredient(parsed, totalBase) {
  if(parsed.unit==='vol') {
    const {val,unit} = tspToHuman(totalBase);
    return `${formatQty(val)} ${unit} ${parsed.name}`;
  }
  if(parsed.unit==='wt') {
    const {val,unit} = ozToHuman(totalBase);
    return `${formatQty(val)} ${unit} ${parsed.name}`;
  }
  if(parsed.unit==='other') {
    return `${formatQty(totalBase)} ${parsed.rawUnit} ${parsed.name}`;
  }
  // count
  return `${formatQty(totalBase)} ${parsed.name}`;
}

// Normalize ingredient name for grouping (strip adjectives like "fresh","frozen","cooked")
function normName(name) {
  return name.toLowerCase()
    .replace(/\b(fresh|frozen|cooked|raw|dried|canned|boneless|skinless|diced|sliced|chopped|minced|grated|shredded|peeled|trimmed|halved|cubed|crushed|ground|heaping|unsweetened|plain|light|lean|large|medium|small|ripe|whole|pure|optional)\b/g,'')
    .replace(/\(.*?\)/g,'')
    .replace(/[,;].*/,'')
    .replace(/\s+/g,' ')
    .trim();
}

// ── State helpers ─────────────────────────────────────────────
function catFor(ing) {
  const l = ing.toLowerCase();
  for(const [cat, kws] of Object.entries(CATS)) {
    if(kws.some(k => l.includes(k))) return cat;
  }
  return 'Other';
}

function showTab(t) {
  document.getElementById('tab-recipes').style.display = t==='recipes'?'block':'none';
  document.getElementById('tab-grocery').style.display = t==='grocery'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='recipes'&&i===0)||(t==='grocery'&&i===1)));
  if(t==='grocery') renderGrocery();
}

function toggleRecipe(id) {
  if(selected.has(id)) { selected.delete(id); }
  else { selected.set(id, 1); }
  document.getElementById('badge').textContent = selected.size;
  document.getElementById('badge').style.display = selected.size>0?'inline-flex':'none';
  const card = document.getElementById('card-'+id);
  card.classList.toggle('selected', selected.has(id));
  card.querySelector('.checkmark').textContent = selected.has(id)?'✓':'';
  // show/hide serving control
  const sc = document.getElementById('sc-'+id);
  if(sc) sc.style.display = selected.has(id) ? 'flex' : 'none';
}

function changeServings(id, delta, e) {
  e.stopPropagation();
  const cur = selected.get(id) || 1;
  const next = Math.max(1, cur + delta);
  selected.set(id, next);
  document.getElementById('sv-'+id).textContent = next + 'x';
}

function toggleDetail(id, e) {
  e.stopPropagation();
  const det = document.getElementById('det-'+id);
  const btn = document.getElementById('btn-'+id);
  const open = det.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.querySelector('span').textContent = open ? 'Hide recipe' : 'View recipe';
}

function renderRecipes() {
  const cats = ['Breakfast','Lunch','Dinner','Snack / Dessert'];
  let html = '';
  for(const cat of cats) {
    const rs = RECIPES.filter(r=>r.cat===cat);
    if(!rs.length) continue;
    html += `<div class="section-head">${cat} — ${rs.length} recipes</div><div class="recipe-grid">`;
    for(const r of rs) {
      const sel = selected.has(r.id);
      const mult = selected.get(r.id) || 1;
      html += `
      <div class="recipe-card${sel?' selected':''}" id="card-${r.id}" onclick="toggleRecipe('${r.id}')">
        <div class="card-header">
          <span class="card-name">${r.name}</span>
          <span class="checkmark">${sel?'✓':''}</span>
        </div>
        <div class="card-macros">
          ${r.cal?`<span class="macro m-cal">${r.cal} cal</span>`:''}
          ${r.protein?`<span class="macro m-pro">${r.protein}g protein</span>`:''}
          ${r.fiber?`<span class="macro m-fib">${r.fiber}g fiber</span>`:''}
        </div>
        <div class="card-serving">Per serving: ${r.serving}${r.totalServings?' &nbsp;·&nbsp; Makes '+r.totalServings+' servings':''}</div>
        <div class="serving-ctrl" id="sc-${r.id}" style="display:${sel?'flex':'none'}" onclick="event.stopPropagation()">
          <button class="sv-btn" onclick="changeServings('${r.id}',-1,event)">−</button>
          <span class="sv-label" id="sv-${r.id}">${mult}x</span>
          <button class="sv-btn" onclick="changeServings('${r.id}',1,event)">+</button>
          <span class="sv-note">servings</span>
        </div>
        <div class="card-expand" id="btn-${r.id}" onclick="toggleDetail('${r.id}',event)">
          <span>View recipe</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="recipe-detail" id="det-${r.id}">
          <div class="detail-section">Ingredients</div>
          <ul class="ingredient-list">${r.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>
          <div class="detail-section">Instructions</div>
          <ol class="step-list">${r.steps.map(s=>`<li><div>${s}</div></li>`).join('')}</ol>
          <a class="recipe-link" href="${r.url}" target="_blank">View full recipe ↗</a>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  document.getElementById('tab-recipes').innerHTML = html;
}

function renderGrocery() {
  if(!selected.size) {
    document.getElementById('tab-grocery').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <div class="empty-text">No recipes selected yet</div>
        <div class="empty-sub">Go to Recipes and check off what you want to make</div>
      </div>`;
    return;
  }

  const selRecipes = RECIPES.filter(r=>selected.has(r.id));
  const totCal = selRecipes.reduce((s,r)=>s+r.cal*(selected.get(r.id)||1),0);
  const totPro  = selRecipes.reduce((s,r)=>s+r.protein*(selected.get(r.id)||1),0);
  const totFib  = selRecipes.reduce((s,r)=>s+r.fiber*(selected.get(r.id)||1),0);

  // ── Aggregate ingredients with real math ──
  // ingMap key: normalized name
  // value: { parsed (first seen), totalBase (sum of base units), unit type, rawUnit, recipes[] }
  const ingMap = {};

  for(const r of selRecipes) {
    const mult = selected.get(r.id) || 1;
    for(const ingStr of r.ingredients) {
      // skip garnish/optional lines
      if(/^(optional|for garnish|for serving|to serve|to taste)/i.test(ingStr.trim())) continue;
      const parsed = parseIngredient(ingStr);
      if(!parsed.name) continue;
      const key = normName(parsed.name);
      if(!key) continue;

      if(!ingMap[key]) {
        ingMap[key] = {
          parsed,
          totalBase: 0,
          unitType: parsed.unit,
          rawUnit: parsed.rawUnit,
          name: parsed.name,
          recipes: []
        };
      }
      ingMap[key].totalBase += parsed.base * mult;
      if(!ingMap[key].recipes.includes(r.name)) ingMap[key].recipes.push(r.name);
    }
  }

  // Group by grocery category
  const grouped = {};
  for(const [key, val] of Object.entries(ingMap)) {
    const display = formatIngredient(val.parsed, val.totalBase);
    const cat = catFor(display);
    if(!grouped[cat]) grouped[cat]=[];
    grouped[cat].push({key, display, recipes: val.recipes});
  }

  const order = [...Object.keys(CATS),'Other'];
  let grocHtml = '';
  for(const cat of order) {
    const items = grouped[cat]||[];
    if(!items.length) continue;
    grocHtml += `<div class="grocery-section"><div class="grocery-section-head">${cat}</div><div class="grocery-items">`;
    for(const item of items) {
      const gid = 'gi_'+item.key.replace(/\W/g,'_').slice(0,40);
      const ck = checked.has(gid);
      grocHtml += `<div class="grocery-item${ck?' done':''}" id="wrap_${gid}">
        <input type="checkbox" id="${gid}" ${ck?'checked':''} onchange="toggleCheck('${gid}')">
        <label for="${gid}">${item.display}</label>
        <span class="from-tag">${item.recipes.slice(0,2).join(', ')}${item.recipes.length>2?' +'+String(item.recipes.length-2)+' more':''}</span>
      </div>`;
    }
    grocHtml += '</div></div>';
  }

  document.getElementById('tab-grocery').innerHTML = `
    <div class="grocery-wrap">
      <div class="grocery-main">${grocHtml}</div>
      <div class="grocery-sidebar">
        <div class="sidebar-title">Selected recipes (${selRecipes.length})</div>
        ${selRecipes.map(r=>{
          const m=selected.get(r.id)||1;
          return `<div class="summary-row">
            <span>${r.name}</span>
            <span style="font-size:11px;color:#888;white-space:nowrap;margin-left:8px">${m}x serving${m>1?'s':''}</span>
          </div>`;
        }).join('')}
        <div style="height:12px"></div>
        <div class="summary-row"><span>Total calories</span><span class="summary-val cal">${totCal}</span></div>
        <div class="summary-row"><span>Total protein</span><span class="summary-val pro">${totPro}g</span></div>
        <div class="summary-row"><span>Total fiber</span><span class="summary-val fib">${totFib}g</span></div>
        <div class="sidebar-actions">
          <button class="btn" onclick="clearChecked()">✓ Clear checked items</button>
          <button class="btn" onclick="deselectAll()">✕ Deselect all recipes</button>
        </div>
      </div>
    </div>`;
}

function toggleCheck(id) {
  const wrap = document.getElementById('wrap_'+id);
  if(checked.has(id)){ checked.delete(id); wrap.classList.remove('done'); }
  else { checked.add(id); wrap.classList.add('done'); }
}
function clearChecked() { checked.clear(); renderGrocery(); }
function deselectAll() {
  selected.clear(); checked.clear();
  document.getElementById('badge').style.display='none';
  renderGrocery(); renderRecipes(); showTab('recipes');
}

renderRecipes();
</script>
